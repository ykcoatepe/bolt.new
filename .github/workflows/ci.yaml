name: CI/CD

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup and Build
        uses: ./.github/actions/setup-and-build

      - name: Run type check
        run: pnpm run typecheck

      # - name: Run ESLint
      #   run: pnpm run lint

      - name: Run tests
        run: pnpm run test

      - name: Check @ai-sdk/openai version
        run: |
          VERSION=$(pnpm list @ai-sdk/openai | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)
          export VERSION
          node - <<'EOF'
          const [major, minor, patch] = process.env.VERSION.split('.').map(Number);
          if (!(major > 0 || (major === 0 && (minor > 7 || (minor === 7 && patch >= 6))))) {
            throw new Error(`@ai-sdk/openai ${process.env.VERSION} < 0.7.6`);
          }
          EOF
